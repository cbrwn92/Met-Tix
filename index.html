<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Metro Transit">
  <title>Metro Transit Ticket</title>
  <style>
    /* Reset and Core iOS Typography */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif; }
    
    body { 
      background-color: #ffffff; 
      display: flex; 
      justify-content: center; 
      height: 100vh; 
      color: #333;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .ticket-container {
      width: 100%;
      max-width: 450px;
      padding: 15px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Top Bar with Close Button */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding-bottom: 20px;
    }
    .close-x { font-size: 26px; color: #0053A0; font-weight: 500; cursor: pointer; padding: 5px; }

    /* Header Section */
    .header-text { width: 100%; text-align: left; margin-bottom: 25px; }
    .header-text h1 { font-size: 28px; font-weight: 700; color: #333333; letter-spacing: -0.5px; }
    .header-text p { font-size: 16px; color: #666; margin-top: 2px; font-weight: 400; }

    /* Two-Circle Snap Layer Animation */
    .animation-container {
      margin: 15px 0;
      width: 320px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* THE ORANGE CIRCLE (Bottom Layer) */
    .base-orange {
      position: absolute;
      width: 275px;
      height: 275px;
      background-color: #F37021; 
      border-radius: 50%;
      animation: orange-pulse 3.2s ease-in-out infinite;
      z-index: 1;
    }

    /* THE GREY/WHITE CIRCLE (Top Shutter Layer) */
    .top-grey {
      position: absolute;
      width: 265px;
      height: 265px;
      background-color: #ffffff; 
      border-radius: 50%;
      animation: grey-pulse 3.2s cubic-bezier(0.6, -0.28, 0.735, 1.45) infinite;
      z-index: 2;
    }

    @keyframes orange-pulse {
      0%, 100% { transform: scale(0.8); }
      50% { transform: scale(1.1); }
    }

    @keyframes grey-pulse {
      0%, 100% { transform: scale(0.72); }
      60% { transform: scale(1.18); } /* Snaps larger than orange to hide it */
    }

    /* Center Logo Clipper */
    .logo-clipper {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(0,0,0,0.06);
    }
    .logo-img { width: 100%; height: auto; }

    /* The Large Clock */
    .ticket-clock { font-size: 72px; font-weight: 700; color: #3a3a3a; margin: 20px 0; letter-spacing: -2.5px; }

    /* Refined Details Box */
    .details-box {
      width: 100%;
      border: 1px solid #e2e2e2;
      border-radius: 12px;
      padding: 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      text-align: left;
    }

    .fare-title { font-size: 26px; font-weight: 600; color: #333; margin-bottom: 4px; letter-spacing: -0.3px; }
    .location-text { font-size: 15px; color: #8a8a8a; margin-bottom: 24px; font-weight: 400; }
    .expiry-text { font-size: 18px; font-weight: 700; color: #5a5a5a; letter-spacing: -0.2px; }

  </style>
</head>
<body>

<div class="ticket-container">
  <div class="top-bar">
    <div class="close-x">✕</div>
  </div>

  <div class="header-text">
    <h1>Metro Transit</h1>
    <p>Show operator your ticket</p>
  </div>

  <div class="animation-container">
    <div class="base-orange"></div>
    <div class="top-grey"></div>
    
    <div class="logo-clipper">
      <img src="logo.png" alt="Go-To" class="logo-img">
    </div>
  </div>

  <div id="clock" class="ticket-clock">--:--:-- --</div>

  <div class="details-box">
    <p class="fare-title">Adult Non-Rush Hour</p>
    <p class="location-text">Minneapolis/ St. Paul Metro Area</p>
    <p class="expiry-text">Expires <span id="expiration"></span></p>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const timeParts = now.toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' });
    document.getElementById('clock').textContent = timeParts.toUpperCase();
  }

  function setExpiration() {
    const now = new Date();
    const exp = new Date(now.getTime() + (2.5 * 60 * 60 * 1000));
    const options = { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true };
    let expStr = exp.toLocaleString('en-US', options).replace(',', ',');
    document.getElementById('expiration').textContent = expStr;
  }

  setInterval(updateClock, 1000);
  updateClock();
  setExpiration();
</script>

</body>
</html>
